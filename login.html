<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Fresh & Organic Cold Storage</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet" />

    <style>
        :root {
            --bg:     #0D1B2A;
            --surf:   #122234;
            --card:   #1A2F42;
            --ac:     #00B4D8;
            --ac-dim: rgba(0,180,216,0.10);
            --ac-mid: rgba(0,180,216,0.22);
            --tx:     #E8F5E9;
            --mt:     #8FAABF;
            --border: rgba(0,180,216,0.14);
            --success:#06D6A0;
            --danger: #FF6B6B;
            --radius: 14px;
        }

        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--tx);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR (injected by navbar.js) ── */
        #navbar-placeholder .navbar {
            background: var(--surf) !important;
            border-bottom: 0.5px solid var(--border);
            padding: 0 !important;
        }
        #navbar-placeholder .navbar-brand h2 { 
            font-size: 18px; 
            color: var(--ac); 
        }

        #navbar-placeholder .navbar-brand small { 
            color: var(--mt); 
            font-size: 10px; 
            letter-spacing: 0.12em; 
        }

        #navbar-placeholder .nav-link { 
            color: var(--mt) !important; 
            font-size: 15px; 
            font-weight: 500; 
            padding: 1.1rem 0.65rem !important; 
            transition: color .2s; 
            font-family: 'Inter', sans-serif; 
            letter-spacing: 0.01em; 
        }

        #navbar-placeholder .nav-link:hover,
        #navbar-placeholder .nav-link.active { 
            color: var(--ac) !important; 
        }

        #navbar-placeholder .custom-btn { 
            background: var(--ac) !important; 
            color: #0D1B2A !important; 
            font-weight: 600; 
            order: none; 
            border-radius: 8px; 
        }

        #navbar-placeholder .navbar-toggler { 
            border-color: var(--border); 
        }

        #navbar-placeholder .navbar-toggler-icon { 
            filter: invert(1); 
        }

        #navbar-placeholder .logo-icon { 
            width: 36px; 
            height: 36px; 
            background: var(--ac-dim); 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--ac); 
            font-size: 16px; 
            margin-right: 10px; 
        }

        #navbar-placeholder .logo-text h2 { 
            color: var(--ac); 
        }

        #navbar-placeholder .bg-light { 
            background: var(--card) !important; 
        }

        #navbar-placeholder .text-dark { 
            color: var(--mt) !important; 
        }

        #navbar-placeholder .search-box {
            position: absolute; top: calc(100% + 10px); right: 0;
            width: 280px; background: var(--surf);
            border: 0.5px solid var(--border); border-radius: var(--radius);
            padding: 10px; z-index: 1000; box-shadow: var(--shadow);
        }
        #navbar-placeholder .search-box .form-control {
            background: var(--card); border: 0.5px solid var(--border);
            color: var(--tx); border-radius: 8px; font-size: 13px;
        }
        #navbar-placeholder .search-box .form-control::placeholder { color: var(--mt); }
        #navbar-placeholder .dropdown-menu {
            background: var(--surf); border: 0.5px solid var(--border) !important;
            border-radius: var(--radius) !important;
        }
        #navbar-placeholder .dropdown-item { 
            color: var(--tx); 
            font-size: 13px; 
        }

        #navbar-placeholder .dropdown-item:hover { 
            background: var(--ac-dim); 
            color: var(--ac); 
        }

        #navbar-placeholder .dropdown-item.text-danger { 
            color: var(--danger) !important; 
        }

        #navbar-placeholder .dropdown-divider { 
            border-color: var(--border); 
        }

        #navbar-placeholder .cart-count-badge { 
            font-size: 9px !important; 
        }

        /* ── PAGE ── */
        .page-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 16px;
            position: relative;
            overflow: hidden;
        }

        /* background grid */
        .page-body::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.3;
        }

        /* glow */
        .page-body::after {
            content: '';
            position: absolute; top: 30%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; height: 300px;
            background: radial-gradient(ellipse, rgba(0,180,216,0.06), transparent 70%);
            pointer-events: none;
        }

        /* ── AUTH CARD ── */
        .auth-wrap { position: relative; z-index: 1; width: 100%; max-width: 440px; }

        .auth-brand {
            text-align: center; margin-bottom: 28px;
        }
        .auth-brand-logo {
            font-size: 32px; margin-bottom: 8px;
        }
        .auth-brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 22px; font-weight: 700; color: var(--ac);
        }
        .auth-brand-sub {
            font-size: 11px; color: var(--mt);
            letter-spacing: 0.12em; text-transform: uppercase;
        }

        .auth-card {
            background: var(--surf);
            border: 0.5px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
            position: relative;
        }
        .auth-card::before {
            content: '';
            position: absolute; top: -1px; left: 32px; right: 32px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--ac), transparent);
            border-radius: 2px;
        }

        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px; font-weight: 700; color: var(--tx);
            margin-bottom: 4px;
        }
        .auth-sub { font-size: 13px; color: var(--mt); margin-bottom: 28px; }

        /* ── FORM ── */
        .form-group { margin-bottom: 18px; }
        .form-label {
            font-size: 12px; font-weight: 600; color: var(--mt);
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.06em; text-transform: uppercase;
            margin-bottom: 6px; display: block;
        }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--mt); font-size: 14px; pointer-events: none;
        }
        .form-control-dark {
            width: 100%;
            background: var(--card);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px 11px 40px;
            font-size: 14px; color: var(--tx);
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control-dark::placeholder { color: var(--mt); }
        .form-control-dark:focus {
            border-color: var(--ac);
            box-shadow: 0 0 0 3px rgba(0,180,216,0.1);
        }
        .form-control-dark.error { border-color: var(--danger); }

        /* password toggle */
        .pwd-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: var(--mt); font-size: 14px; cursor: pointer;
            transition: color .15s;
        }
        .pwd-toggle:hover { color: var(--ac); }

        /* forgot */
        .forgot-link {
            font-size: 12px; color: var(--ac); text-decoration: none;
            float: right; margin-top: -4px;
            transition: opacity .15s;
        }
        .forgot-link:hover { opacity: 0.8; color: var(--ac); }

        /* error msg */
        .field-error { font-size: 11px; color: var(--danger); margin-top: 5px; display: none; }
        .field-error.show { display: block; }

        /* ── SUBMIT BTN ── */
        .btn-submit {
            width: 100%; padding: 13px;
            background: var(--ac); color: #0D1B2A;
            font-size: 15px; font-weight: 700;
            border: none; border-radius: 10px;
            cursor: pointer; font-family: 'Inter', sans-serif;
            transition: background .2s, transform .15s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 8px;
        }
        .btn-submit:hover { background: #00c8f0; transform: translateY(-1px); }
        .btn-submit:disabled { background: var(--card); color: var(--mt); cursor: not-allowed; transform: none; }

        /* ── DIVIDER ── */
        .or-divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0; font-size: 12px; color: var(--mt);
        }
        .or-divider::before, .or-divider::after {
            content: ''; flex: 1; height: 0.5px; background: var(--border);
        }

        /* ── GOOGLE BTN ── */
        .btn-google {
            width: 100%; padding: 11px;
            background: var(--card); color: var(--tx);
            font-size: 14px; font-weight: 500;
            border: 0.5px solid var(--border); border-radius: 10px;
            cursor: pointer; font-family: 'Inter', sans-serif;
            transition: all .2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-google:hover { border-color: var(--ac-mid); background: var(--ac-dim); }
        .google-icon { font-size: 16px; }

        /* ── SWITCH LINK ── */
        .auth-switch {
            text-align: center; margin-top: 22px;
            font-size: 13px; color: var(--mt);
        }
        .auth-switch a { color: var(--ac); text-decoration: none; font-weight: 600; }
        .auth-switch a:hover { text-decoration: underline; }

        /* ── ALERT ── */
        .auth-alert {
            padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 18px;
            display: none; align-items: center; gap: 8px;
        }
        .auth-alert.show { display: flex; }
        .auth-alert.error { background: rgba(255,107,107,0.1); border: 0.5px solid rgba(255,107,107,0.3); color: var(--danger); }
        .auth-alert.success { background: rgba(6,214,160,0.1); border: 0.5px solid rgba(6,214,160,0.3); color: var(--success); }

        /* ── FOOTER ── */
        footer { background: #060E17; border-top: 0.5px solid var(--border); padding: 20px 0; text-align: center; font-size: 12px; color: var(--mt); }
        footer a { color: var(--mt); text-decoration: none; }
        footer a:hover { color: var(--ac); }
    </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-body">
    <div class="auth-wrap">

        <!-- Brand -->
        <div class="auth-brand">
            <div class="auth-brand-logo">🌿</div>
            <div class="auth-brand-name">Fresh &amp; Organic</div>
            <div class="auth-brand-sub">Cold Storage</div>
        </div>

        <!-- Card -->
        <div class="auth-card">
            <div class="auth-title">Welcome Back</div>
            <div class="auth-sub">Login to your account to continue shopping</div>

            <!-- Alert -->
            <div class="auth-alert error" id="alertBox">
                <i class="fa fa-exclamation-circle"></i>
                <span id="alertMsg"></span>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-wrap">
                    <i class="fa fa-envelope input-icon"></i>
                    <input type="email" class="form-control-dark" id="emailInput"
                           placeholder="your@email.com" />
                </div>
                <div class="field-error" id="emailError">Please enter a valid email address</div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label">
                    Password
                    <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                </label>
                <div class="input-wrap">
                    <i class="fa fa-lock input-icon"></i>
                    <input type="password" class="form-control-dark" id="passwordInput"
                           placeholder="Enter your password" />
                    <i class="fa fa-eye pwd-toggle" id="pwdToggle" onclick="togglePwd('passwordInput','pwdToggle')"></i>
                </div>
                <div class="field-error" id="passwordError">Password must be at least 6 characters</div>
            </div>

            <!-- Submit -->
            <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
                <i class="fa fa-sign-in-alt"></i> Login
            </button>

            <!-- Divider -->
            <div class="or-divider">or continue with</div>

            <!-- Google -->
            <button class="btn-google" onclick="handleGoogle()">
                <span class="google-icon">G</span>
                <span>Continue with Google</span>
            </button>

            <!-- Switch -->
            <div class="auth-switch">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>

    </div>
</div>

<footer>
    <span>© 2026 Fresh &amp; Organic Cold Storage &nbsp;·&nbsp;
    <a href="index.html">Home</a> &nbsp;·&nbsp;
    <a href="products.html">Products</a></span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/navbar.js"></script>

<script type="module">
import { getApp, initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey:            "AIzaSyBGxXVoJVRSdCmvL8DJZ5SJysLH8OcU9CQ",
    authDomain:        "fresh-organic-6f341.firebaseapp.com",
    projectId:         "fresh-organic-6f341",
    storageBucket:     "fresh-organic-6f341.firebasestorage.app",
    messagingSenderId: "1020727069856",
    appId:             "1:1020727069856:web:3cc4c4ec43c42084620dc5"
};

let app;
try { app = getApp(); } catch(e) { app = initializeApp(firebaseConfig); }
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

/* redirect if already logged in */
onAuthStateChanged(auth, user => {
    if (user) redirectAfterLogin();
});

/* redirect destination */
function redirectAfterLogin() {
    const from = sessionStorage.getItem('loginRedirectFrom');
    sessionStorage.removeItem('loginRedirectFrom');
    window.location.href = from || 'index.html';
}

/* show alert */
function showAlert(msg, type = 'error') {
    const box = document.getElementById('alertBox');
    document.getElementById('alertMsg').textContent = msg;
    box.className = 'auth-alert show ' + type;
}

/* password toggle */
window.togglePwd = function(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
};

/* validate */
function validate() {
    let ok = true;
    const email = document.getElementById('emailInput').value.trim();
    const pwd   = document.getElementById('passwordInput').value;

    document.getElementById('emailError').classList.remove('show');
    document.getElementById('passwordError').classList.remove('show');
    document.getElementById('emailInput').classList.remove('error');
    document.getElementById('passwordInput').classList.remove('error');

    if (!email || !/\S+@\S+\.\S+/.test(email)) {
        document.getElementById('emailError').classList.add('show');
        document.getElementById('emailInput').classList.add('error');
        ok = false;
    }
    if (pwd.length < 6) {
        document.getElementById('passwordError').classList.add('show');
        document.getElementById('passwordInput').classList.add('error');
        ok = false;
    }
    return ok;
}

/* login with email */
window.handleLogin = async function() {
    if (!validate()) return;
    const btn   = document.getElementById('loginBtn');
    const email = document.getElementById('emailInput').value.trim();
    const pwd   = document.getElementById('passwordInput').value;

    btn.disabled = true;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Logging in...';

    try {
        await signInWithEmailAndPassword(auth, email, pwd);
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(redirectAfterLogin, 800);
    } catch(e) {
        let msg = 'Login failed. Please try again.';
        if (e.code === 'auth/user-not-found')   msg = 'No account found with this email.';
        if (e.code === 'auth/wrong-password')    msg = 'Incorrect password. Please try again.';
        if (e.code === 'auth/invalid-email')     msg = 'Invalid email address.';
        if (e.code === 'auth/too-many-requests') msg = 'Too many attempts. Please try later.';
        if (e.code === 'auth/invalid-credential') msg = 'Invalid email or password.';
        showAlert(msg);
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-sign-in-alt"></i> Login';
    }
};

/* login with Google */
window.handleGoogle = async function() {
    try {
        await signInWithPopup(auth, provider);
        redirectAfterLogin();
    } catch(e) {
        showAlert('Google sign-in failed. Please try again.');
    }
};

/* enter key */
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
